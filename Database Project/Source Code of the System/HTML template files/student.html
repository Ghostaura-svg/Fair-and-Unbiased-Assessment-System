<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet">
</head>
<body class="dashboard-body">

<div class="dashboard-wrapper">
    <aside class="sidebar">
        <h4>Student Panel</h4>
        <a href="#">Dashboard</a>
        <a href="#">My Courses</a>
        <a href="#">My Assessments</a>
        <a href="#">My Submissions</a>
        <a href="#">My Results</a>
        <a href="{{ url_for('auth.logout') }}" class="logout-link">Logout</a>
    </aside>

    <main class="dashboard-content">
        <div class="topbar">
            <h5>Welcome, {{ session.get("first_name") }}</h5>
            <span>Student</span>
        </div>

        <h2 class="page-title">Student Dashboard</h2>

        <div class="content-box">
            <h5>Student Workflow</h5>
            <p>
                Students will view registered courses, assessments, submissions,
                marks, feedback, and academic reports.
            </p>
        </div>
    </main>
</div>

</body>
</html>
